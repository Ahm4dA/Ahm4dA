<svg width="900" height="30" viewBox="0 0 900 30" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Section divider">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#818cf8" stop-opacity="0.8"/>
      <stop offset="0.8" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a5f3fc" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="dGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <line x1="30" y1="15" x2="870" y2="15" stroke="url(#line)" stroke-width="1.2"/>

  <rect y="13.6" width="110" height="2.8" rx="1.4" fill="url(#pulseGrad)">
    <animate attributeName="x" values="-120;910" dur="4.5s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#dGlow)">
    <rect x="445" y="10" width="10" height="10" fill="none" stroke="#67e8f9" stroke-width="1.4">
      <animateTransform attributeName="transform" type="rotate" from="45 450 15" to="405 450 15" dur="9s" repeatCount="indefinite"/>
    </rect>
    <circle cx="418" cy="15" r="2" fill="#22d3ee">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="482" cy="15" r="2" fill="#a78bfa">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
