<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Muhammad Ahmad Adnan — Software Engineer, AI/ML Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.55" stop-color="#0a101f"/>
      <stop offset="1" stop-color="#0c1328"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.4 0; 0.4 0; -0.4 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#334155" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.55"/>
    </linearGradient>

    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softBlur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#3b82f6" stroke-opacity="0.07" fill="none" stroke-width="1"/>
    </pattern>

    <clipPath id="frame">
      <rect width="900" height="300" rx="18"/>
    </clipPath>

    <style>
      text { font-family: 'Segoe UI', -apple-system, Ubuntu, 'Helvetica Neue', Arial, sans-serif; }
      .mono { font-family: 'Cascadia Code', 'Segoe UI Mono', 'Fira Code', 'JetBrains Mono', Consolas, Menlo, monospace; }

      @keyframes dash { to { stroke-dashoffset: -22; } }
      .flow { stroke-dasharray: 3 8; animation: dash 1.8s linear infinite; }
      .flowSlow { stroke-dasharray: 3 8; animation: dash 3.2s linear infinite; }

      @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }
      .node { animation: pulse 3s ease-in-out infinite; }
      .n1 { animation-delay: 0s; } .n2 { animation-delay: .5s; } .n3 { animation-delay: 1s; }
      .n4 { animation-delay: 1.5s; } .n5 { animation-delay: 2s; } .n6 { animation-delay: 2.5s; }

      @keyframes breathe { 0%, 100% { opacity: 0.22; } 50% { opacity: 0.45; } }
      .blob { animation: breathe 8s ease-in-out infinite; }
      .blob2 { animation: breathe 8s ease-in-out 4s infinite; }

      @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
      .fu { opacity: 0; animation: fadeUp 0.9s cubic-bezier(.2,.7,.3,1) forwards; }
      .d1 { animation-delay: .15s; } .d2 { animation-delay: .35s; } .d3 { animation-delay: .6s; }
      .c1 { animation-delay: .8s; } .c2 { animation-delay: .92s; } .c3 { animation-delay: 1.04s; }
      .c4 { animation-delay: 1.16s; } .c5 { animation-delay: 1.28s; }

      @keyframes grow { to { transform: scaleX(1); } }
      .bar { transform: scaleX(0); transform-origin: 450px 0px; animation: grow 0.8s .95s cubic-bezier(.2,.7,.3,1) forwards; }

      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      .cursor { animation: blink 1.1s steps(1) infinite; }

      @keyframes sweep { 0% { transform: translateX(-320px); } 55%, 100% { transform: translateX(1150px); } }
      .sweep { animation: sweep 8s cubic-bezier(.4,0,.6,1) infinite; }

      @keyframes rise {
        0% { transform: translateY(0); opacity: 0; }
        8% { opacity: .55; }
        80% { opacity: .35; }
        100% { transform: translateY(-330px); opacity: 0; }
      }
      .p { animation: rise 10s linear infinite; }
      .pa { animation-delay: -1s; } .pb { animation-delay: -3s; } .pc { animation-delay: -5s; }
      .pd { animation-delay: -6.5s; } .pe { animation-delay: -8s; } .pf { animation-delay: -2s; } .pg { animation-delay: -4.2s; }
    </style>
  </defs>

  <!-- ==================== BACKDROP ==================== -->
  <g clip-path="url(#frame)">
    <rect width="900" height="300" fill="url(#bg)"/>
    <rect width="900" height="300" fill="url(#grid)"/>

    <circle class="blob" cx="150" cy="55" r="160" fill="#06b6d4" filter="url(#softBlur)"/>
    <circle class="blob2" cx="760" cy="255" r="175" fill="#8b5cf6" filter="url(#softBlur)"/>

    <!-- ==================== NEURAL NETWORK · LEFT ==================== -->
    <g stroke-width="1">
      <path d="M60 72 L150 48" stroke="#22d3ee" stroke-opacity="0.20" class="flow"/>
      <path d="M60 72 L118 142" stroke="#a78bfa" stroke-opacity="0.20" class="flowSlow"/>
      <path d="M150 48 L228 96" stroke="#22d3ee" stroke-opacity="0.20" class="flow"/>
      <path d="M118 142 L228 96" stroke="#22d3ee" stroke-opacity="0.18" class="flowSlow"/>
      <path d="M118 142 L232 184" stroke="#a78bfa" stroke-opacity="0.20" class="flow"/>
      <path d="M118 142 L58 212" stroke="#22d3ee" stroke-opacity="0.18" class="flowSlow"/>
      <path d="M58 212 L158 238" stroke="#a78bfa" stroke-opacity="0.20" class="flow"/>
      <path d="M158 238 L232 184" stroke="#22d3ee" stroke-opacity="0.18" class="flowSlow"/>
      <path d="M228 96 L232 184" stroke="#a78bfa" stroke-opacity="0.18" class="flow"/>
      <path d="M58 212 L96 262" stroke="#22d3ee" stroke-opacity="0.16" class="flowSlow"/>
      <path d="M158 238 L96 262" stroke="#a78bfa" stroke-opacity="0.16" class="flow"/>
    </g>
    <g filter="url(#nodeGlow)">
      <circle class="node n1" cx="60" cy="72" r="3.5" fill="#22d3ee"/>
      <circle class="node n3" cx="150" cy="48" r="3" fill="#a78bfa"/>
      <circle class="node n2" cx="118" cy="142" r="4.5" fill="#22d3ee"/>
      <circle class="node n5" cx="58" cy="212" r="3" fill="#a78bfa"/>
      <circle class="node n4" cx="158" cy="238" r="3.5" fill="#22d3ee"/>
      <circle class="node n6" cx="228" cy="96" r="3.5" fill="#c084fc"/>
      <circle class="node n1" cx="232" cy="184" r="3" fill="#22d3ee"/>
      <circle class="node n4" cx="96" cy="262" r="2.5" fill="#a78bfa"/>
    </g>
    <g filter="url(#nodeGlow)">
      <circle r="2.4" fill="#67e8f9">
        <animateMotion dur="4s" repeatCount="indefinite" path="M60 72 L228 96 L232 184"/>
      </circle>
      <circle r="2.2" fill="#c4b5fd">
        <animateMotion dur="5.2s" begin="1.2s" repeatCount="indefinite" path="M118 142 L58 212 L158 238"/>
      </circle>
      <circle r="2" fill="#67e8f9">
        <animateMotion dur="6s" begin="2.4s" repeatCount="indefinite" path="M150 48 L118 142 L232 184"/>
      </circle>
    </g>

    <!-- ==================== NEURAL NETWORK · RIGHT ==================== -->
    <g stroke-width="1">
      <path d="M840 72 L750 48" stroke="#22d3ee" stroke-opacity="0.20" class="flow"/>
      <path d="M840 72 L782 142" stroke="#a78bfa" stroke-opacity="0.20" class="flowSlow"/>
      <path d="M750 48 L672 96" stroke="#22d3ee" stroke-opacity="0.20" class="flow"/>
      <path d="M782 142 L672 96" stroke="#22d3ee" stroke-opacity="0.18" class="flowSlow"/>
      <path d="M782 142 L668 184" stroke="#a78bfa" stroke-opacity="0.20" class="flow"/>
      <path d="M782 142 L842 212" stroke="#22d3ee" stroke-opacity="0.18" class="flowSlow"/>
      <path d="M842 212 L742 238" stroke="#a78bfa" stroke-opacity="0.20" class="flow"/>
      <path d="M742 238 L668 184" stroke="#22d3ee" stroke-opacity="0.18" class="flowSlow"/>
      <path d="M672 96 L668 184" stroke="#a78bfa" stroke-opacity="0.18" class="flow"/>
      <path d="M842 212 L804 262" stroke="#22d3ee" stroke-opacity="0.16" class="flowSlow"/>
      <path d="M742 238 L804 262" stroke="#a78bfa" stroke-opacity="0.16" class="flow"/>
    </g>
    <g filter="url(#nodeGlow)">
      <circle class="node n2" cx="840" cy="72" r="3.5" fill="#22d3ee"/>
      <circle class="node n4" cx="750" cy="48" r="3" fill="#a78bfa"/>
      <circle class="node n1" cx="782" cy="142" r="4.5" fill="#22d3ee"/>
      <circle class="node n6" cx="842" cy="212" r="3" fill="#a78bfa"/>
      <circle class="node n3" cx="742" cy="238" r="3.5" fill="#22d3ee"/>
      <circle class="node n5" cx="672" cy="96" r="3.5" fill="#c084fc"/>
      <circle class="node n2" cx="668" cy="184" r="3" fill="#22d3ee"/>
      <circle class="node n3" cx="804" cy="262" r="2.5" fill="#a78bfa"/>
    </g>
    <g filter="url(#nodeGlow)">
      <circle r="2.4" fill="#67e8f9">
        <animateMotion dur="4.6s" begin="0.6s" repeatCount="indefinite" path="M840 72 L672 96 L668 184"/>
      </circle>
      <circle r="2.2" fill="#c4b5fd">
        <animateMotion dur="5.4s" begin="1.8s" repeatCount="indefinite" path="M782 142 L842 212 L742 238"/>
      </circle>
      <circle r="2" fill="#67e8f9">
        <animateMotion dur="6.2s" begin="3s" repeatCount="indefinite" path="M750 48 L782 142 L668 184"/>
      </circle>
    </g>

    <!-- ==================== FLOATING PARTICLES ==================== -->
    <g fill="#7dd3fc">
      <g transform="translate(120 300)"><circle class="p pa" r="1.8"/></g>
      <g transform="translate(300 300)"><circle class="p pb" r="1.4"/></g>
      <g transform="translate(430 300)"><circle class="p pc" r="2"/></g>
      <g transform="translate(560 300)"><circle class="p pd" r="1.5"/></g>
      <g transform="translate(690 300)"><circle class="p pe" r="1.8"/></g>
      <g transform="translate(210 300)"><circle class="p pf" r="1.3" fill="#c4b5fd"/></g>
      <g transform="translate(790 300)"><circle class="p pg" r="1.5" fill="#c4b5fd"/></g>
    </g>

    <!-- ==================== HUD DETAILS ==================== -->
    <g class="fu d1">
      <text x="26" y="34" class="mono" font-size="12" fill="#38bdf8" opacity="0.75">~/ahm4da</text>
      <rect class="cursor" x="90" y="24" width="7" height="12" fill="#38bdf8" opacity="0.75"/>
    </g>
    <g class="fu d1">
      <circle class="node n2" cx="728" cy="30" r="3.5" fill="#34d399"/>
      <text x="874" y="34" text-anchor="end" class="mono" font-size="12" fill="#34d399" opacity="0.85">open to collaborate</text>
    </g>

    <path d="M22 48 V30 Q22 22 30 22 H48" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>
    <path d="M852 22 H870 Q878 22 878 30 V48" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>
    <path d="M22 252 V270 Q22 278 30 278 H48" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>
    <path d="M852 278 H870 Q878 278 878 270 V252" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>

    <!-- ==================== CENTER CONTENT ==================== -->
    <text x="450" y="98" text-anchor="middle" class="mono fu d1" font-size="12.5" letter-spacing="5" fill="#22d3ee" opacity="0.9">// SOFTWARE ENGINEER · AI/ML DEVELOPER</text>

    <text x="450" y="154" text-anchor="middle" class="fu d2" font-size="50" font-weight="800" letter-spacing="2" fill="url(#nameGrad)" filter="url(#glow)">MUHAMMAD AHMAD ADNAN</text>

    <rect class="bar" x="390" y="170" width="120" height="3" rx="1.5" fill="url(#barGrad)"/>

    <text x="450" y="202" text-anchor="middle" class="fu d3" font-size="16.5" fill="#9fb3c8">Turning research notebooks into production-grade intelligent systems</text>

    <!-- ==================== CAPABILITY CHIPS ==================== -->
    <g class="fu c1">
      <rect x="154" y="234" width="60" height="26" rx="13" fill="#22d3ee" fill-opacity="0.07" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="184" y="251" text-anchor="middle" class="mono" font-size="11.5" letter-spacing="1.5" fill="#67e8f9">NLP</text>
    </g>
    <g class="fu c2">
      <rect x="228" y="234" width="138" height="26" rx="13" fill="#a78bfa" fill-opacity="0.08" stroke="#a78bfa" stroke-opacity="0.4"/>
      <text x="297" y="251" text-anchor="middle" class="mono" font-size="11.5" letter-spacing="1.5" fill="#c4b5fd">DEEP LEARNING</text>
    </g>
    <g class="fu c3">
      <rect x="380" y="234" width="146" height="26" rx="13" fill="#22d3ee" fill-opacity="0.07" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="453" y="251" text-anchor="middle" class="mono" font-size="11.5" letter-spacing="1.5" fill="#67e8f9">DATA PIPELINES</text>
    </g>
    <g class="fu c4">
      <rect x="540" y="234" width="76" height="26" rx="13" fill="#a78bfa" fill-opacity="0.08" stroke="#a78bfa" stroke-opacity="0.4"/>
      <text x="578" y="251" text-anchor="middle" class="mono" font-size="11.5" letter-spacing="1.5" fill="#c4b5fd">MLOPS</text>
    </g>
    <g class="fu c5">
      <rect x="630" y="234" width="116" height="26" rx="13" fill="#22d3ee" fill-opacity="0.07" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="688" y="251" text-anchor="middle" class="mono" font-size="11.5" letter-spacing="1.5" fill="#67e8f9">FULL-STACK</text>
    </g>

    <!-- ==================== LIGHT SWEEP ==================== -->
    <g transform="skewX(-18)">
      <rect class="sweep" x="0" y="-40" width="180" height="380" fill="url(#shineGrad)"/>
    </g>
  </g>

  <!-- ==================== FRAME BORDER ==================== -->
  <rect x="1" y="1" width="898" height="298" rx="17" stroke="url(#borderGrad)" stroke-width="1.5" fill="none"/>
</svg>
